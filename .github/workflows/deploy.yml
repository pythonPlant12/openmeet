# Deploy Stage

name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  # Deploy to VPS
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add known hosts
        run: ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            set -e

            REPO_DIR=\"/home/debian/openmeet\"
            DEPLOY_BRANCH=\"master\"

            # Clone or update repo
            if [ ! -d \"\$REPO_DIR/.git\" ]; then
              cd /home/debian
              rm -rf openmeet
              git clone --branch \"\$DEPLOY_BRANCH\" --recursive https://github.com/${{ github.repository }}.git openmeet
            else
              cd \$REPO_DIR
              git fetch --all
              git checkout \"\$DEPLOY_BRANCH\"
              git reset --hard \"origin/\$DEPLOY_BRANCH\"
              git submodule sync --recursive
              git submodule update --init --recursive --force
            fi

            cd \$REPO_DIR
            chmod +x deploy.sh
            ./deploy.sh
          "

      - name: Health check
        run: |
          sleep 30
          curl -f https://openmeets.eu/health || echo "Health check pending..."
